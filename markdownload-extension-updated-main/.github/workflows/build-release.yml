name: Build and Release Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v4.0.1)"
        required: false

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "src/package-lock.json"

      - name: Setup npm
        run: npm install --global npm@11.8.0

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install dependencies
        working-directory: src
        run: npm ci || npm ci || npm ci

      - name: Run unit tests
        working-directory: src
        run: npm run test:unit

      - name: Run integration tests
        working-directory: src
        run: npm run test:integration

  build:
    name: Build Extension Packages
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "src/package-lock.json"

      - name: Setup npm
        run: npm install --global npm@11.8.0

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install dependencies
        working-directory: src
        run: npm ci || npm ci || npm ci

      - name: Run ESLint
        working-directory: src
        run: npm run lint:js

      - name: Get version from manifest
        id: get-version
        working-directory: src
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extension version: $VERSION"

      - name: Generate browser-specific manifests
        working-directory: src
        run: npm run build:manifests

      - name: Run web-ext lint (Firefox)
        working-directory: src
        run: npx web-ext lint -s .build/firefox

      - name: Create dist directory
        run: mkdir -p dist

      - name: Build Agent Bridge companions
        working-directory: native
        run: |
          mkdir -p ../dist

          build_bridge() {
            local goos="$1"
            local goarch="$2"
            local archive_name="$3"
            local stage_dir="../dist/.agent-bridge-${goos}-${goarch}"
            local cli_name="marksnip"
            local host_name="marksnip-native-host"

            rm -rf "$stage_dir"
            mkdir -p "$stage_dir"

            if [ "$goos" = "windows" ]; then
              cli_name="${cli_name}.exe"
              host_name="${host_name}.exe"
            fi

            GOOS="$goos" GOARCH="$goarch" go build -o "${stage_dir}/${cli_name}" ./cmd/marksnip
            GOOS="$goos" GOARCH="$goarch" go build -o "${stage_dir}/${host_name}" ./cmd/marksnip-native-host
            cp README.md "${stage_dir}/README.md"

            if [ "$goos" = "windows" ]; then
              (cd "$stage_dir" && zip -r "../${archive_name}" .)
            else
              (cd "$stage_dir" && tar -czf "../${archive_name}" .)
            fi

            rm -rf "$stage_dir"
          }

          build_bridge windows amd64 marksnip-agent-bridge-windows-amd64.zip
          build_bridge darwin amd64 marksnip-agent-bridge-macos-amd64.tar.gz
          build_bridge darwin arm64 marksnip-agent-bridge-macos-arm64.tar.gz
          build_bridge linux amd64 marksnip-agent-bridge-linux-amd64.tar.gz

      - name: Create Chrome package (.zip)
        working-directory: src/.build/chrome
        run: |
          zip -r ../../../dist/marksnip-chrome-${{ steps.get-version.outputs.version }}.zip . \
            -x "*.DS_Store"

      - name: Create Firefox package (.xpi)
        working-directory: src/.build/firefox
        run: |
          zip -r ../../../dist/marksnip-firefox-${{ steps.get-version.outputs.version }}.xpi . \
            -x "*.DS_Store"

      - name: Upload Chrome artifact
        uses: actions/upload-artifact@v4
        with:
          name: marksnip-chrome
          path: dist/marksnip-chrome-${{ steps.get-version.outputs.version }}.zip
          retention-days: 30

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@v4
        with:
          name: marksnip-firefox
          path: dist/marksnip-firefox-${{ steps.get-version.outputs.version }}.xpi
          retention-days: 30

      - name: Upload Agent Bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: marksnip-agent-bridge
          path: |
            dist/marksnip-agent-bridge-windows-amd64.zip
            dist/marksnip-agent-bridge-macos-amd64.tar.gz
            dist/marksnip-agent-bridge-macos-arm64.tar.gz
            dist/marksnip-agent-bridge-linux-amd64.tar.gz
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Chrome artifact
        uses: actions/download-artifact@v4
        with:
          name: marksnip-chrome
          path: ./artifacts

      - name: Download Firefox artifact
        uses: actions/download-artifact@v4
        with:
          name: marksnip-firefox
          path: ./artifacts

      - name: Download Agent Bridge artifact
        uses: actions/download-artifact@v4
        with:
          name: marksnip-agent-bridge
          path: ./artifacts

      - name: List artifacts
        run: ls -la ./artifacts/

      - name: Get tag name
        id: get-tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
            if [ -z "$TAG" ]; then
              TAG="v${{ needs.build.outputs.version }}"
            fi
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.get-tag.outputs.tag }}"
          VERSION="${VERSION#v}"

          CHANGELOG_ENTRY="$(awk -v version="$VERSION" '
            $0 == "## " version { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md)"

          if [ -n "$CHANGELOG_ENTRY" ]; then
            CHANGELOG_ENTRY="$(printf '%s\n' "$CHANGELOG_ENTRY" | sed '/./,$!d')"
          else
            CHANGELOG_ENTRY="- No changelog entry found for version $VERSION."
          fi

          {
            echo "changes<<EOF"
            printf '%s\n' "$CHANGELOG_ENTRY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get-tag.outputs.tag }}
          name: MarkSnip ${{ steps.get-tag.outputs.tag }}
          body: |
            ## MarkSnip ${{ steps.get-tag.outputs.tag }}

            ### Installation

            **Chrome:**
            1. Download `marksnip-chrome-${{ needs.build.outputs.version }}.zip`
            2. Go to `chrome://extensions/`
            3. Enable "Developer mode"
            4. Click "Load unpacked" and select the extracted folder
            5. Or drag and drop the .zip file to install

            **Firefox:**
            1. Download `marksnip-firefox-${{ needs.build.outputs.version }}.xpi`
            2. Open Firefox and drag the .xpi file into the browser
            3. Confirm the installation

            **Agent Bridge (choose the archive for your OS):**
            - Windows x64: `marksnip-agent-bridge-windows-amd64.zip`
            - macOS Intel: `marksnip-agent-bridge-macos-amd64.tar.gz`
            - macOS Apple Silicon: `marksnip-agent-bridge-macos-arm64.tar.gz`
            - Linux x64: `marksnip-agent-bridge-linux-amd64.tar.gz`

            After extracting the archive:
            - Windows: run `.\marksnip.exe install-host`
            - macOS/Linux: run `./marksnip install-host`
            - Then enable **Agent Bridge** in the extension settings

            ### Changes
            ${{ steps.changelog.outputs.changes }}

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for all version changes.

          files: |
            artifacts/*.zip
            artifacts/*.tar.gz
            artifacts/*.xpi
          draft: false
          prerelease: false
